# Role Schema Definition

identity:
  name: string (required)
  purpose: string (required)
  class: string (required)  # read-only, executor, validator, recovery, router

backend_preferences:
  preferred_backends: [string]
  fallback_backend: string

model_preferences:
  preferred_models: [string]
  fallback_model: string
  max_model_cost: string  # low, medium, high

permissions:
  can_read: boolean
  can_write: boolean
  can_execute: boolean
  can_delegate: boolean
  can_split_tasks: boolean
  can_escalate: boolean

scope_policy:
  allowed_paths: [string]
  forbidden_paths: [string]
  default_scope_mode: string  # strict, moderate, open

limits:
  max_files_touched: integer
  max_turns: integer
  max_commands: integer
  max_runtime_seconds: integer
  max_output_tokens: integer

behavior_tuning:
  initiative: integer  # 0-10
  caution: integer  # 0-10
  skepticism: integer  # 0-10
  creativity: integer  # 0-10
  persistence: integer  # 0-10
  verbosity: integer  # 0-10
  assumption_tolerance: integer  # 0-10

output_contract:
  required_fields: [string]
  optional_fields: [string]
  format: string  # markdown, json, yaml

handoff_contract:
  requires_confirmation: boolean
  must_include: [string]
  min_confidence: float

escalation_policy:
  triggers: [string]
  escalation_target: string
  auto_escalate_on_block: boolean

extensions:
  custom_fields: map
