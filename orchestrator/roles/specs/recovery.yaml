# Recovery Role
# Recovers stalled work - inherits from base_recovery

extends: base_recovery

identity:
  name: recovery
  purpose: Recover stalled state and propose next moves
  class: recovery

permissions:
  can_read: true
  can_write: true
  can_execute: false
  can_delegate: true
  can_split_tasks: true
  can_escalate: true

limits:
  max_files_touched: 30
  max_turns: 4
  max_commands: 0

behavior_tuning:
  initiative: 3
  caution: 9
  skepticism: 8
  creativity: 7
  persistence: 4
  verbosity: 5
  assumption_tolerance: 4

output_contract:
  required_fields:
    - status
    - summary
    - blockers
    - recommended_next_role
    - recommended_next_step
  optional_fields:
    - recovery_plan
    - pivot_suggestion
    - state_analysis

handoff_contract:
  requires_confirmation: true
  must_include:
    - summary
    - recovery_plan
    - recommended_next_step
  min_confidence: 0.5
