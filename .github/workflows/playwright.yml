name: Playwright UI tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Start web UI
        run: |
          nohup python3 ui/web.py > server.log 2>&1 &
          # wait for server to start (timeout 60s)
          for i in {1..60}; do
            if curl -sS http://localhost:5000/api/health | grep -q "true"; then
              echo 'server up' && break
            fi
            sleep 1
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Playwright
        run: |
          npm init -y
          npm i -D @playwright/test
          npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          # expect playwright tests under tests/playwright or repo root
          npx playwright test --project=chromium || true

      - name: Upload server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log
